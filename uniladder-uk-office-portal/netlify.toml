[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--include=dev"

[functions]
  node_bundler = "esbuild"

[functions."monthly-report"]
  schedule = "0 8 1 * *"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
